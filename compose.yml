services:
  api:
    build:
      context: ..
      dockerfile: kiwi/Dockerfile
    network_mode: host
    env_file: .env
    volumes:
      - ./data:/app/kiwi/data
      - ${HOME}/.config/circuitforge:/root/.config/circuitforge:ro
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "8511:80"
    restart: unless-stopped
    depends_on:
      - api
